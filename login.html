<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Management - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --surface2: #f5f6f8;
            --border: #e1e4e8;
            --accent: #5b7cff;
            --accent2: #4a68ff;
            --accent-dim: #7a8e1e;
            --text: #1f2937;
            --text-dim: #6b7280;
            --red: #ff4757;
            --green: #2ed573;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .noise { position:fixed; inset:0; pointer-events:none; z-index:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); opacity:0.4; }
        .container { position:relative; z-index:1; width:100%; max-width:400px; padding:0 20px; }
        .auth-card { background:var(--surface); border:1px solid var(--border); border-radius:4px; padding:40px; }
        .logo { font-family:'Bebas Neue',sans-serif; font-size:2rem; letter-spacing:0.05em; color:var(--accent); margin-bottom:10px; text-align:center; line-height:1; }
        .logo span { color:var(--text-dim); font-size:1rem; font-family:'IBM Plex Mono',monospace; display:block; letter-spacing:0.2em; }
        .subtitle { font-family:'IBM Plex Mono',monospace; font-size:0.7rem; color:var(--text-dim); text-align:center; letter-spacing:0.15em; text-transform:uppercase; margin-bottom:30px; }
        .form-group { margin-bottom:16px; }
        label { font-size:0.72rem; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; letter-spacing:0.1em; text-transform:uppercase; display:block; margin-bottom:6px; }
        input { width:100%; background:var(--surface2); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:3px; font-family:'IBM Plex Sans',sans-serif; font-size:0.88rem; transition:border-color 0.15s; outline:none; }
        input:focus { border-color:var(--accent-dim); }
        .btn { padding:10px 20px; border:none; border-radius:3px; cursor:pointer; font-family:'IBM Plex Mono',monospace; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:600; transition:all 0.15s; width:100%; }
        .btn-primary { background:var(--accent); color:#ffffff; }
        .btn-primary:hover { background:var(--accent2); transform:translateY(-2px); }
        .btn-primary:active { transform:translateY(0); }
        .toggle-text { text-align:center; margin-top:20px; font-size:0.8rem; color:var(--text-dim); }
        .toggle-link { color:var(--accent); cursor:pointer; text-decoration:underline; font-weight:500; }
        .toggle-link:hover { color:var(--accent2); }
        .form-section { display:none; }
        .form-section.active { display:block; }
        .error-msg { color:var(--red); font-size:0.75rem; margin-top:4px; display:none; }
        .error-msg.show { display:block; }
        .success-msg { color:var(--green); font-size:0.75rem; margin-bottom:16px; display:none; }
        .success-msg.show { display:block; }
        .loading { display:none; text-align:center; color:var(--text-dim); font-size:0.75rem; margin-top:10px; }
        .loading.show { display:block; }
    </style>
</head>
<body>
    <div class="noise"></div>
    <div class="container">
        <div class="auth-card">
            <h1 class="logo">BILL<span>MGMT</span></h1>
            <p class="subtitle">Management System</p>

            <!-- Login Form -->
            <div id="loginForm" class="form-section active">
                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    <div class="error-msg" id="loginEmailError"></div>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password" required>
                    <div class="error-msg" id="loginPasswordError"></div>
                </div>
                <div id="successMsg" class="success-msg"></div>
                <button class="btn btn-primary" onclick="handleLogin(event)">Login</button>
                <div class="loading" id="loginLoading">Logging in...</div>
                <p class="toggle-text">No account? <span class="toggle-link" onclick="toggleForms()">Register</span></p>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="form-section">
                <div class="form-group">
                    <label for="registerName">Name</label>
                    <input type="text" id="registerName" placeholder="Full Name" required>
                    <div class="error-msg" id="registerNameError"></div>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email</label>
                    <input type="email" id="registerEmail" placeholder="you@example.com" required>
                    <div class="error-msg" id="registerEmailError"></div>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Min 6 characters" required>
                    <div class="error-msg" id="registerPasswordError"></div>
                </div>
                <div class="form-group">
                    <label for="registerPasswordConfirm">Confirm Password</label>
                    <input type="password" id="registerPasswordConfirm" placeholder="Confirm password" required>
                    <div class="error-msg" id="confirmPasswordError"></div>
                </div>
                <button class="btn btn-primary" onclick="handleRegister(event)">Register</button>
                <div class="loading" id="registerLoading">Creating...</div>
                <p class="toggle-text">Have account? <span class="toggle-link" onclick="toggleForms()">Login</span></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = ''; // Use relative URLs (same domain/port)

        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('active');
            document.getElementById('registerForm').classList.toggle('active');
            clearErrors();
        }

        function clearErrors() {
            document.querySelectorAll('.error-msg').forEach(el => {
                el.classList.remove('show');
                el.textContent = '';
            });
        }

        async function handleLogin(event) {
            clearErrors();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loading = document.getElementById('loginLoading');

            loading.classList.add('show');

            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/index.html';
                } else {
                    showError('loginPasswordError', data.message || 'Login failed');
                }
            } catch (error) {
                showError('loginPasswordError', 'Unable to connect to server. Make sure backend is running on port 3000.');
            } finally {
                loading.classList.remove('show');
            }
        }

        async function handleRegister(event) {
            clearErrors();

            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerPasswordConfirm').value;

            if (password !== confirmPassword) {
                showError('confirmPasswordError', 'Passwords do not match');
                return;
            }

            if (password.length < 6) {
                showError('registerPasswordError', 'Password must be at least 6 characters');
                return;
            }

            const loading = document.getElementById('registerLoading');
            loading.classList.add('show');

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('successMsg').textContent = 'Account created! Logging in...';
                    document.getElementById('successMsg').classList.add('show');
                    setTimeout(() => {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        window.location.href = '/index.html';
                    }, 1500);
                } else {
                    showError('registerEmailError', data.message || 'Registration failed');
                }
            } catch (error) {
                showError('registerEmailError', 'Unable to connect to server. Make sure backend is running on port 5000.');
            } finally {
                loading.classList.remove('show');
            }
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.classList.add('show');
            }
        }

        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
